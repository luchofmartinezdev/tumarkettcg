@if (isMaintenanceActive()) {
  <app-maintenance></app-maintenance>
} @else {
  <app-navbar></app-navbar>

  @if (isLoading()) {
    <div
      class="fixed inset-0 z-50 flex items-center justify-center bg-white/60 dark:bg-slate-900/60 backdrop-blur-sm"
    >
      <div class="flex flex-col items-center gap-3">
        <div
          class="w-10 h-10 border-4 border-gray-200 dark:border-slate-800 border-t-indigo-500 rounded-full animate-spin"
        ></div>
        <span class="text-sm text-gray-500 dark:text-slate-400 font-medium">Cargando...</span>
      </div>
    </div>
  }

  <main class="min-h-screen bg-[#f8fafc] dark:bg-slate-900 transition-colors duration-300">
    <router-outlet></router-outlet>
  </main>

  <app-toast></app-toast>
  <app-footer></app-footer>
}
