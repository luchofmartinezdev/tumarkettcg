<div
  style="
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-end;
  "
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      (click)="toastService.remove(toast.id)"
      [style]="toastStyles(toast.type)"
      style="
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        min-width: 260px;
        max-width: 360px;
      "
    >
      <p style="font-size: 14px; font-weight: 700; flex: 1; color: white">{{ toast.message }}</p>

      <svg
        style="width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0"
        fill="none"
        stroke="white"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </div>
  }
</div>
