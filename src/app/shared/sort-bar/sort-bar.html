<div class="flex items-center gap-3 mb-8 animate-in fade-in slide-in-from-right duration-700">
  <div
    class="flex p-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-[1.5rem] gap-1 shadow-sm transition-colors"
  >
    @for (option of options; track option) {
      <button
        (click)="changeSort(option)"
        [class]="
          selectedOption() === option
            ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 dark:shadow-blue-900/40'
            : 'text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900/50 hover:text-slate-600 dark:hover:text-slate-300'
        "
        class="px-5 py-2 rounded-[1.2rem] text-[10px] font-black uppercase tracking-widest transition-all duration-300"
      >
        {{ option }}
      </button>
    }
  </div>
</div>
