<div class="flex flex-col gap-2 w-full">
  @if (label) {
    <label
      class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] ml-4 transition-colors"
    >
      {{ label }}
    </label>
  }

  <div class="relative">
    <button
      type="button"
      (click)="toggle()"
      class="w-full bg-slate-50 dark:bg-slate-900/50 border-none rounded-2xl px-6 py-4 text-sm font-bold flex items-center justify-between outline-none focus:ring-4 focus:ring-blue-500/5 dark:focus:ring-blue-500/10 transition-all text-left group"
    >
      <span
        [class.text-slate-300]="!value()"
        class="dark:text-slate-200"
        [class.dark:text-slate-600]="!value()"
      >
        {{ value() || placeholder }}
      </span>
      <svg
        class="w-4 h-4 text-slate-400 dark:text-slate-500 transition-transform duration-300 group-hover:text-blue-600 dark:group-hover:text-blue-400"
        [class.rotate-180]="isOpen()"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    @if (isOpen()) {
      <div
        class="absolute z-[100] w-full mt-2 bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl dark:shadow-black/40 border border-slate-100 dark:border-slate-700 p-2 overflow-hidden animate-in fade-in zoom-in-95 duration-200 transition-colors"
      >
        <div class="max-h-60 overflow-y-auto scrollbar-hide">
          @for (opt of options; track opt) {
            <button
              type="button"
              (click)="selectOption(opt)"
              class="w-full text-left px-5 py-3.5 rounded-xl text-xs font-bold uppercase tracking-wide transition-all hover:bg-blue-50 dark:hover:bg-slate-900/50 hover:text-blue-600 dark:hover:text-blue-400 flex items-center justify-between group text-slate-700 dark:text-slate-300"
              [class.bg-slate-50]="value() === opt"
              [class.dark:bg-slate-900]="value() === opt"
            >
              {{ opt }}
              @if (value() === opt) {
                <div class="w-1.5 h-1.5 rounded-full bg-blue-600 dark:bg-blue-400"></div>
              }
            </button>
          }
        </div>
      </div>

      <div class="fixed inset-0 z-[90]" (click)="isOpen.set(false)"></div>
    }
  </div>
</div>
