<div
  class="min-h-screen bg-[#f8fafc] dark:bg-slate-900 pt-28 pb-20 px-4 transition-colors duration-300"
>
  <div class="max-w-5xl mx-auto">
    @if (authService.currentUser(); as user) {
      <!-- Contenido según ruta activa -->
      @switch (activeTab) {
        @case ('info') {
          <app-profile-info />
        }
        @case ('anuncios') {
          <app-my-posts />
        }
        @case ('contactos') {
          <app-profile-contacts />
        }
        @case ('favoritos') {
          <app-profile-favorites />
        }
      }
    }
  </div>
</div>
